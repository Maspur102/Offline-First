name: UTD Advanced CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build_and_test:
    runs-on: ubuntu-latest

    steps:
      - name: Download / Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies
        run: flutter pub get

      - name: Run Build Runner (Generate Isar Code)
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # TANTANGAN ANTI-AI: Menjalankan Unit Test Mocktail di Server
      - name: Run Unit Tests
        run: flutter test

      # TANTANGAN ANTI-AI: Build APK wajib mode PROD
      - name: Build APK Release (Mode PROD)
        run: flutter build apk --release --dart-define=ENV_NAME=PROD

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UTD-20123011-Release-APK
          path: build/app/outputs/flutter-apk/app-release.apk
